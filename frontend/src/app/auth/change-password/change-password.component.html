<div class="auth-wrapper">
  <div class="auth-panel" style="width:100%;">
    <div class="auth-card">
      <div class="auth-header">
        <div class="brand-logo" style="margin-bottom:1.5rem;">
          <span class="logo-icon">T</span>
          <span class="logo-text">TaskFlow</span>
        </div>
        <h2>Set new password</h2>
        <p>You need to set a new password before continuing</p>
      </div>
      <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
        <div class="form-group">
          <label>Current Password</label>
          <input type="password" formControlName="currentPassword" data-testid="current-password" />
          <span class="error-msg" *ngIf="form.get('currentPassword')?.touched && form.get('currentPassword')?.invalid">Required</span>
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" formControlName="newPassword" data-testid="new-password" />
          <span class="error-msg" *ngIf="form.get('newPassword')?.touched && form.get('newPassword')?.errors?.['minlength']">Min 8 characters</span>
        </div>
        <div class="form-group">
          <label>Confirm New Password</label>
          <input type="password" formControlName="confirmPassword" data-testid="confirm-password" />
        </div>
        <div class="alert-error" *ngIf="error">{{ error }}</div>
        <button type="submit" class="btn btn-primary btn-lg w-full" [disabled]="loading" data-testid="change-pwd-submit">
          {{ loading ? 'Saving...' : 'Set Password & Continue' }}
        </button>
      </form>
    </div>
  </div>
</div>
