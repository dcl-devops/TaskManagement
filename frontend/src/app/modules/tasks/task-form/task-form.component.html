<div class="page-header">
  <h1>{{ editId ? 'Edit Task' : 'New Task' }}</h1>
  <div class="header-actions">
    <button class="btn btn-secondary" (click)="cancel()">Cancel</button>
    <button class="btn btn-primary" (click)="save()" [disabled]="saving" data-testid="save-task-btn">
      <span *ngIf="saving" class="spinner" style="width:14px;height:14px;border-width:2px;"></span>
      {{ saving ? 'Saving...' : (editId ? 'Update Task' : 'Create Task') }}
    </button>
  </div>
</div>

<div *ngIf="loading" class="loading-overlay"><div class="spinner"></div></div>

<form [formGroup]="form" class="task-form-grid" *ngIf="!loading">
  <div class="form-main card">
    <div class="form-card-body">
      <div class="form-group" style="margin-bottom:1.25rem;">
        <label>Category *</label>
        <select formControlName="category" data-testid="task-category">
          <option value="task">Task</option>
          <option value="subtask">Subtask</option>
          <option value="meeting">Meeting Task</option>
          <option value="project">Project Task</option>
        </select>
      </div>

      <div class="form-group" *ngIf="showParentTask" style="margin-bottom:1.25rem;">
        <label>Parent Task *</label>
        <select formControlName="parent_task_id" data-testid="parent-task">
          <option [value]="null">Select parent task</option>
          <option *ngFor="let t of tasks" [value]="t.id">{{ t.task_number }} - {{ t.title }}</option>
        </select>
      </div>

      <div class="form-group" *ngIf="showMeeting" style="margin-bottom:1.25rem;">
        <label>Meeting</label>
        <select formControlName="meeting_id" data-testid="task-meeting">
          <option [value]="null">Select meeting</option>
          <option *ngFor="let m of meetings" [value]="m.id">{{ m.meeting_number }} - {{ m.title }}</option>
        </select>
      </div>

      <div class="form-group" *ngIf="showProject" style="margin-bottom:1.25rem;">
        <label>Project</label>
        <select formControlName="project_id" data-testid="task-project">
          <option [value]="null">Select project</option>
          <option *ngFor="let p of projects" [value]="p.id">{{ p.project_number }} - {{ p.title }}</option>
        </select>
      </div>

      <div class="form-group" style="margin-bottom:1.25rem;">
        <label>Task Title *</label>
        <input type="text" formControlName="title" placeholder="Enter task title..." data-testid="task-title" />
        <span class="error-msg" *ngIf="form.get('title')?.touched && form.get('title')?.invalid">Title is required (min 3 chars)</span>
      </div>

      <div class="form-group" style="margin-bottom:1.25rem;">
        <label>Description</label>
        <textarea formControlName="description" rows="5" placeholder="Describe the task..." data-testid="task-description"></textarea>
      </div>

      <div class="form-group" style="margin-bottom:1.25rem;">
        <label>Tags (comma separated)</label>
        <input type="text" formControlName="tags" placeholder="tag1, tag2, tag3" data-testid="task-tags" />
      </div>
    </div>
  </div>

  <div class="form-sidebar">
    <div class="card">
      <div class="card-header-sm">Assignment</div>
      <div class="form-card-body">
        <div class="form-group">
          <label>Assign To *</label>
          <select formControlName="assigned_to" data-testid="task-assign-to">
            <option [value]="null">Select user</option>
            <option *ngFor="let u of users" [value]="u.id">{{ u.name }}</option>
          </select>
          <span class="error-msg" *ngIf="form.get('assigned_to')?.touched && form.get('assigned_to')?.invalid">Required</span>
        </div>
        <div class="form-group">
          <label>Assigned By</label>
          <select formControlName="assigned_by" data-testid="task-assign-by">
            <option [value]="null">Select user</option>
            <option *ngFor="let u of users" [value]="u.id">{{ u.name }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Department</label>
          <select formControlName="department_id" data-testid="task-dept">
            <option [value]="null">Select department</option>
            <option *ngFor="let d of departments" [value]="d.id">{{ d.name }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Location</label>
          <select formControlName="location_id" data-testid="task-location">
            <option [value]="null">Select location</option>
            <option *ngFor="let l of locations" [value]="l.id">{{ l.name }}</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:1rem;">
      <div class="card-header-sm">Schedule & Priority</div>
      <div class="form-card-body">
        <div class="form-group">
          <label>Start Date *</label>
          <input type="date" formControlName="start_date" data-testid="task-start-date" />
        </div>
        <div class="form-group">
          <label>Due Date</label>
          <input type="date" formControlName="due_date" data-testid="task-due-date" />
        </div>
        <div class="form-group" *ngIf="editId">
          <label>Completion Date</label>
          <input type="date" formControlName="completion_date" data-testid="task-completion-date" />
        </div>
        <div class="form-group">
          <label>Priority *</label>
          <select formControlName="priority" data-testid="task-priority">
            <option value="critical">Critical</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>
        </div>
        <div class="form-group" *ngIf="editId">
          <label>Status</label>
          <select formControlName="status" data-testid="task-status">
            <option value="open">Open</option>
            <option value="in_progress">In Progress</option>
            <option value="on_hold">On Hold</option>
            <option value="resolved">Resolved</option>
            <option value="closed">Completed</option>
          </select>
        </div>
        <div class="form-group">
          <label>Estimated Effort (hours)</label>
          <input type="number" formControlName="estimated_effort" min="0" step="0.5" data-testid="task-effort" />
        </div>
      </div>
    </div>
  </div>
</form>
