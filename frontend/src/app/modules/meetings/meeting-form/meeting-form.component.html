<div class="page-header">
  <h1>{{ editId ? 'Edit Meeting' : 'New Meeting' }}</h1>
  <div class="header-actions">
    <button class="btn btn-secondary" routerLink="/meetings">Cancel</button>
    <button class="btn btn-primary" (click)="save()" [disabled]="saving" data-testid="save-meeting-btn">
      {{ saving ? 'Saving...' : (editId ? 'Update' : 'Create Meeting') }}
    </button>
  </div>
</div>
<form [formGroup]="form" class="form-grid">
  <div class="card">
    <div class="form-body">
      <div class="form-group">
        <label>Title *</label>
        <input type="text" formControlName="title" placeholder="Meeting title" data-testid="meeting-title" />
        <span class="error-msg" *ngIf="form.get('title')?.touched && form.get('title')?.invalid">Required</span>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea formControlName="description" rows="4" placeholder="Meeting agenda..."></textarea>
      </div>
      <div class="form-group">
        <label>Members</label>
        <div class="member-search-wrap">
          <input type="text" [(ngModel)]="memberSearch" [ngModelOptions]="{standalone: true}" placeholder="Type to search members..." class="member-search-input" data-testid="member-search" />
          <div class="member-search-results" *ngIf="memberSearch.length >= 1 && filteredUsers.length > 0">
            <div *ngFor="let u of filteredUsers" class="member-search-item" (click)="addMember(u)">
              <img *ngIf="u.avatar_url" [src]="u.avatar_url" class="avatar avatar-sm avatar-img" />
              <div class="avatar avatar-sm" *ngIf="!u.avatar_url">{{ u.name?.charAt(0) }}</div>
              <span class="text-sm">{{ u.name }}</span>
              <span class="text-xs text-muted">{{ u.email }}</span>
            </div>
          </div>
        </div>
        <div class="selected-members" *ngIf="selectedMembers.length > 0">
          <div *ngFor="let m of selectedMembers" class="member-chip">
            <span>{{ m.name }}</span>
            <button class="chip-remove" (click)="removeMember(m)">&times;</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="form-sidebar">
    <div class="card">
      <div class="card-header-sm">Details</div>
      <div class="form-body">
        <div class="form-group">
          <label>Owner *</label>
          <select formControlName="owner_id" data-testid="meeting-owner">
            <option [value]="null">Select owner</option>
            <option *ngFor="let u of users" [value]="u.id">{{ u.name }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Project</label>
          <select formControlName="project_id">
            <option [value]="null">No project</option>
            <option *ngFor="let p of projects" [value]="p.id">{{ p.title }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date & Time *</label>
          <input type="datetime-local" formControlName="meeting_date" data-testid="meeting-date" />
        </div>
        <div class="form-group">
          <label>Location</label>
          <select formControlName="location_id">
            <option [value]="null">Select location</option>
            <option *ngFor="let l of locations" [value]="l.id">{{ l.name }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Virtual Link</label>
          <input type="url" formControlName="virtual_link" placeholder="https://meet.google.com/..." />
        </div>
        <div class="form-group">
          <label>Status</label>
          <select formControlName="status">
            <option value="open">Open</option>
            <option value="in_progress">In Progress</option>
            <option value="recurring">Recurring</option>
            <option value="closed">Completed</option>
          </select>
        </div>
      </div>
    </div>
  </div>
</form>
