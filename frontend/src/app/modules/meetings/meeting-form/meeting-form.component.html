<div class="page-header">
  <h1>{{ editId ? 'Edit Meeting' : 'New Meeting' }}</h1>
  <div class="header-actions">
    <button class="btn btn-secondary" routerLink="/meetings">Cancel</button>
    <button class="btn btn-primary" (click)="save()" [disabled]="saving" data-testid="save-meeting-btn">
      {{ saving ? 'Saving...' : (editId ? 'Update' : 'Create Meeting') }}
    </button>
  </div>
</div>
<form [formGroup]="form" class="form-grid">
  <div class="card">
    <div class="form-body">
      <div class="form-group">
        <label>Title *</label>
        <input type="text" formControlName="title" placeholder="Meeting title" data-testid="meeting-title" />
        <span class="error-msg" *ngIf="form.get('title')?.touched && form.get('title')?.invalid">Required</span>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea formControlName="description" rows="4" placeholder="Meeting agenda..."></textarea>
      </div>
      <div class="form-group">
        <label>Members</label>
        <div class="members-list">
          <div *ngFor="let u of users" class="member-row" (click)="toggleMember(u)" [class.selected]="isMember(u.id)">
            <div class="avatar avatar-sm">{{ u.name?.charAt(0) }}</div>
            <span class="text-sm">{{ u.name }}</span>
            <span *ngIf="isMember(u.id)" style="margin-left:auto;color:var(--accent-blue);">&#10003;</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="form-sidebar">
    <div class="card">
      <div class="card-header-sm">Details</div>
      <div class="form-body">
        <div class="form-group">
          <label>Owner *</label>
          <select formControlName="owner_id" data-testid="meeting-owner">
            <option [value]="null">Select owner</option>
            <option *ngFor="let u of users" [value]="u.id">{{ u.name }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date & Time *</label>
          <input type="datetime-local" formControlName="meeting_date" data-testid="meeting-date" />
        </div>
        <div class="form-group">
          <label>Location</label>
          <select formControlName="location_id">
            <option [value]="null">Select location</option>
            <option *ngFor="let l of locations" [value]="l.id">{{ l.name }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Virtual Link</label>
          <input type="url" formControlName="virtual_link" placeholder="https://meet.google.com/..." />
        </div>
        <div class="form-group">
          <label>Status</label>
          <select formControlName="status">
            <option value="open">Open</option>
            <option value="in_progress">In Progress</option>
            <option value="recurring">Recurring</option>
            <option value="closed">Closed</option>
          </select>
        </div>
      </div>
    </div>
  </div>
</form>
